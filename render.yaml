services:
  # ─── Full-Stack Next.js Service (MongoDB Powered) ──────────────────────────
  - type: web
    name: biggestlogs-v2
    env: node
    plan: free
    region: ohio
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Set this in Render Dashboard
      - key: DATABASE_URL
        sync: false # Set same as MONGODB_URI
      - key: NEXTAUTH_SECRET
        sync: false # Set this in Render Dashboard
      - key: NEXTAUTH_URL
        value: https://biggestlogs-v2.onrender.com # Update this after deploy
      - key: TLOGS_API_KEY
        sync: false
      - key: TLOGS_BASE_URL
        value: https://tlogsmarketplace.com/api
