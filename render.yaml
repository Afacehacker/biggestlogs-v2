services:
  # Backend Service (Express)
  - type: web
    name: biggestlogs-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: TLOGS_API_KEY
        sync: false
      - key: TLOGS_USER_ID
        sync: false
      - key: VND_TO_NGN_RATE
        sync: false

  # Frontend Service (Next.js)
  - type: web
    name: biggestlogs-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        sync: false # Point this to your backend service URL
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
