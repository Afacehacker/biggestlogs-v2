services:
  # Backend Service (Express)
  - type: web
    name: biggestlogs-backend
    env: node
    plan: free
    # Changed: Running from root to ensure all workspace dependencies and lockfiles are resolved correctly
    buildCommand: npm install && npx prisma generate --schema=backend/prisma/schema.prisma
    startCommand: tsx backend/server/index.ts
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: TLOGS_API_KEY
        sync: false
      - key: TLOGS_USER_ID
        sync: false
      - key: VND_TO_NGN_RATE
        sync: false

  # Frontend Service (Next.js)
  - type: web
    name: biggestlogs-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
