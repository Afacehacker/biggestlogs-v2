services:
  # ─── Standalone Backend (Express + MongoDB + Socket.io) ───────────────────
  - type: web
    name: biggestlogs-v2-backend
    env: node
    plan: free
    region: ohio
    buildCommand: npm install && npm run build:server # Need to add this to package.json
    startCommand: npm run server
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: PORT
        value: 5000
